<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>{{ title }}</title>
		<link rel="stylesheet" href="/css/index.css">
		<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
	</head>
	<body>
		<main>
			
<a href="/docs">Back</a>
<div class="spacer"></div>

<h1 id="title" class="huge">{{ title }}</h1>

<div id="opening">
	
</div>

<hr />

<div id="content">
	
</div>

<link
	rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/prismjs@1.28.0/plugins/toolbar/prism-toolbar.min.css"
/>
<link rel="stylesheet" href="/css/prismstyle.css" />
<script src="https://cdn.jsdelivr.net/combine/npm/prismjs@1.28.0/components/prism-core.min.js,npm/prismjs@1.28.0/plugins/toolbar/prism-toolbar.min.js,npm/prismjs@1.28.0/plugins/show-language/prism-show-language.min.js,npm/prismjs@1.28.0/plugins/copy-to-clipboard/prism-copy-to-clipboard.min.js,npm/prismjs@1.28.0/plugins/autoloader/prism-autoloader.min.js"></script>

<style>
	#opening {
		font-size: 1em;
		margin-bottom: 1px gray solid;
		margin-bottom: 1em;
		margin-top: 0.5em;
	}

	hr {
		color: rgba(128, 128, 128, 0.3);
	}

	#content {
		margin-top: 1em;
		font-size: 100%;
	}

	pre {
		font-size: 90%;
		border: 1px solid rgb(185, 185, 185);
		margin-top: 1em !important;
	}

	p {
		margin-top: 0.5em;
	}

	p {
		font-size: 1em;
	}

	#content h1,
	h2,
	h3,
	h4,
	h5,
	h6 {
		margin-top: 0.75em;
		text-transform: uppercase;
	}

	ul,
	ol {
		margin-top: 0.5em;
	}
</style>

		</main>

</html>
